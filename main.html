<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jujutsu Kaisen</title>
    <link rel="stylesheet" href="styles/main.css">
    <script defer src="script/script.js"></script>
</head>

<body>

<header>
    <h2>Jujutsu Kaisen</h2>

    <input type="text" id="buscar" placeholder="Buscar...">
    <button id="btnBuscar">Buscar</button>

    <select id="tema">
        <option value="claro">Claro</option>
        <option value="oscuro">Oscuro</option>
        <option value="personal">Personalizado</option>
        <option value="restaurar">Restaurar colores</option>
    </select>

    <button id="btnAdd">Añadir tarjeta</button>
</header>

<div id="panelColores" class="modalColores">
    <div class="panelContenido">
        <label>Header:</label>
        <input type="color" id="colorHeader">

        <label>Body:</label>
        <input type="color" id="colorBody">

        <label>Footer:</label>
        <input type="color" id="colorFooter">

        <button id="btnAplicarColores">Aplicar</button>
    </div>
</div>

<div id="resultado"></div>

<footer>
    <p>Proyecto lenguaje de marcas: Joel, Iker y Oskar.</p>
</footer>

</body>
</html>

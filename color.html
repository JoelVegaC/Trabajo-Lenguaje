<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Color Personalizado</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
            text-align: center;
            padding-top: 40px;
        }

        .selector {
            margin: 20px;
            font-size: 18px;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #00aaff;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Elige los colores personalizados</h2>

    <div class="selector">
        <label>Color del BODY:</label>
        <input type="color" id="colorBody">
    </div>

    <div class="selector">
        <label>Color del HEADER:</label>
        <input type="color" id="colorHeader">
    </div>

    <div class="selector">
        <label>Color del FOOTER:</label>
        <input type="color" id="colorFooter">
    </div>

    <button onclick="guardarColores()">Aplicar y volver</button>

    <script>
        function guardarColores() {
            const bodyColor = document.getElementById("colorBody").value;
            const headerColor = document.getElementById("colorHeader").value;
            const footerColor = document.getElementById("colorFooter").value;

            localStorage.setItem("colorBody", bodyColor);
            localStorage.setItem("colorHeader", headerColor);
            localStorage.setItem("colorFooter", footerColor);

            window.close();
        }
    </script>

</body>
</html>
